            <span class="notification p-relative">
              <i class="fa-regular fa-bell fa-lg"></i>
            </span>
            <img src="images/avatar.png" alt="avatar image" />
          </div>
        </div>
        <h1 class="p-relative">Dashboard</h1>

        <div class="wrapper d-grid gap-20">
          <div class="welcome bg-white radius-10 txt-c-mobile d-block-mobile">
            <div class="intro bg-eee p-20 d-flex flex-between">
              <div>
                <h2 class="m-0">Welcome</h2>
                <p class="c-grey mt-5">Kandil</p>
              </div>
              <img
                src="images/welcome.png"
                class="d-none-mobile"
                alt="welcome image"
              />

            <img class="avatar" src="images/avatar.png" alt="avatar image" />

            <div
              class="body d-flex flex-between p-20 d-block-mobile txt-center"

              <div class="txt-center mb-20">
                Mohamed Kandil

              </div>
              <div class="txt-center mb-20">
                80
                <span class="d-block c-grey mt-5">Project</span>
              </div>
              <div class="txt-center mb-20">

              </div>
            </div>
            <div class="p-20">
              <a href="profile.html" class="btn-shape visit">Profile</a>
            </div>
          </div>

          <div class="quik-draft bg-white radius-10 p-20">
            <h2 class="m-0 mb-10">Quick Draft</h2>
            <p class="c-grey mb-10">Write A Draft For Your Ideas</p>
            <form class="full-width">
              <input
                class="d-block full-width mb-20 radius-10 p-10 bg-eee"
                type="text"
                placeholder="Title"
              />
              <textarea
                class="d-block full-width p-10 bg-eee radius-10"
                placeholder="Your Thought"
              ></textarea>
            </form>
            <input type="submit" value="Save" class="save btn-shape" />
          </div>
